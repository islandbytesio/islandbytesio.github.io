name: Comprehension Gate — PR

# Triggers when a PR targeting main is opened, updated, or moves out of draft.
# Generates 3 questions via Claude, posts them as a PR comment, and sets a
# pending commit status that must be resolved before the PR can merge.
#
# Configure which branches are gated by changing the `branches` list below.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main

permissions:
  pull-requests: write
  statuses: write
  contents: read

jobs:
  generate-questions:
    name: Generate Comprehension Questions
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # ── Get the full diff for this PR ──────────────────────────────────────
      - name: Get diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }} \
            > /tmp/pr_diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr_diff.txt)
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT
          echo "Diff size: $DIFF_SIZE bytes"

      - name: Skip if diff is empty
        if: steps.diff.outputs.diff_size == '0'
        run: |
          echo "No diff found — skipping comprehension gate."
          exit 0

      # ── Ask Claude for 3 questions ─────────────────────────────────────────
      - name: Generate questions via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/comprehension_gate.py generate /tmp/pr_diff.txt \
            > /tmp/questions.json

      # ── Post the questions as a PR comment and set pending status ──────────
      - name: Post questions and set pending status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const questionsData = JSON.parse(fs.readFileSync('/tmp/questions.json', 'utf8'));
            const sha = context.payload.pull_request.head.sha;
            const prNumber = context.payload.pull_request.number;

            // Render each question with its A/B/C/D choices (correct answer NOT shown)
            const qBlocks = questionsData.questions.map(q => {
              const choiceLines = Object.entries(q.choices)
                .map(([letter, text]) => `- **${letter})** ${text}`)
                .join('\n');
              return `**Q${q.id}.** ${q.question}\n${choiceLines}`;
            }).join('\n\n');

            // Embed the full question data (including correct answers) as a hidden
            // HTML comment so the answer-checker can retrieve them without a DB.
            const hiddenData = Buffer.from(JSON.stringify({
              questions: questionsData.questions,
              sha,
              generated_at: new Date().toISOString(),
            })).toString('base64');

            const body = [
              '## 🧠 Comprehension Gate',
              '',
              'Answer the questions below to confirm you understand these changes. Reply with just the letters — no sentences needed.',
              '',
              qBlocks,
              '',
              '***',
              '',
              '**Reply with your answers:**',
              '',
              '```',
              '1. A',
              '2. C',
              '3. B',
              '```',
              '',
              `> Questions are based on commit \`${sha.substring(0, 7)}\`. Pushing new commits regenerates the questions.`,
              '',
              `<!-- comprehension-gate: ${hiddenData} -->`,
            ].join('\n');

            // Upsert: update existing gate comment if present, otherwise create
            const allComments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber }
            );
            const existing = allComments
              .filter(c => c.user.type === 'Bot' && c.body.includes('<!-- comprehension-gate:'))
              .pop();

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated gate comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new gate comment');
            }

            // Set (or reset) the commit status to pending
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              description: 'Answer the 3 comprehension questions in the PR comments',
              context: 'Comprehension Gate',
            });
            console.log(`Set pending status on ${sha.substring(0, 7)}`);
