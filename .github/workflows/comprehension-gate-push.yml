name: Comprehension Gate — Push

# Triggered on every push to a non-main branch.
# Generates comprehension questions for the pushed commit, posts them as a
# commit comment, and sets a PENDING commit status.
#
# The status is intentionally left pending — it resolves when the developer
# opens a PR and passes the PR-level comprehension check. This means even
# direct pushes to feature branches require comprehension before merging.
#
# To skip for a specific push, include "[skip-gate]" in the commit message.

on:
  push:
    branches-ignore:
      - main

permissions:
  statuses: write
  contents: write

jobs:
  generate-questions:
    name: Generate Comprehension Questions for Push
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-gate]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # ── Get the diff introduced by this commit ─────────────────────────────
      - name: Get commit diff
        id: diff
        run: |
          git diff HEAD^..HEAD > /tmp/commit_diff.txt
          DIFF_SIZE=$(wc -c < /tmp/commit_diff.txt)
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT
          echo "Diff size: $DIFF_SIZE bytes"

      - name: Skip if diff is empty or trivial
        if: steps.diff.outputs.diff_size == '0'
        run: |
          echo "No diff — skipping comprehension gate."
          exit 0

      # ── Generate questions ─────────────────────────────────────────────────
      - name: Generate questions via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/comprehension_gate.py generate /tmp/commit_diff.txt \
            > /tmp/questions.json
          echo "Generated questions:"
          cat /tmp/questions.json

      # ── Post as a commit comment and set pending status ────────────────────
      - name: Post questions as commit comment and set status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const questionsData = JSON.parse(fs.readFileSync('/tmp/questions.json', 'utf8'));
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);

            const qBlocks = questionsData.questions.map(q => {
              const choiceLines = Object.entries(q.choices)
                .map(([letter, text]) => `- **${letter})** ${text}`)
                .join('\n');
              return `**Q${q.id}.** ${q.question}\n${choiceLines}`;
            }).join('\n\n');

            const hiddenData = JSON.stringify({
              questions: questionsData.questions,
              sha,
              generated_at: new Date().toISOString(),
            });

            const commentBody =
              `## 🧠 Comprehension Gate — Commit \`${shortSha}\`\n\n` +
              `Before this commit can be merged to \`main\`, you'll need to answer these in a PR (just reply with the letters):\n\n` +
              qBlocks +
              `\n\n---\n` +
              `_Open a PR targeting \`main\` — the gate comment there will have the answer format._\n\n` +
              `<!-- comprehension-gate: ${hiddenData} -->`;

            // Post as a commit comment
            try {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body: commentBody,
              });
              console.log(`Posted questions as commit comment on ${shortSha}`);
            } catch (e) {
              console.warn('Could not post commit comment:', e.message);
            }

            // Set a pending commit status — this gates merging via branch protection
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              description: 'Open a PR and answer the comprehension questions to pass',
              context: 'Comprehension Gate',
            });
            console.log(`Set pending status on ${shortSha}`);
